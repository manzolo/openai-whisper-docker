name: Docker Build & Run Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 1 * *'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t openai-whisper .

      - name: Build CPU-only Docker image
        run: docker build --build-arg TORCH_VARIANT=cpu -t openai-whisper:cpu .

      - name: Verify whisper is installed
        run: docker run --rm openai-whisper whisper --help

      - name: Verify ffmpeg is installed
        run: docker run --rm openai-whisper ffmpeg -version

      - name: Verify Python is available
        run: docker run --rm openai-whisper python3 --version

      - name: Build with Docker Compose (CPU profile)
        run: docker compose --profile cpu build

      - name: Generate test audio
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends espeak-ng
          mkdir -p e2e
          espeak-ng "the quick brown fox jumps over the lazy dog" -w e2e/test.wav

      - name: End-to-end transcription test (default image, tiny model)
        run: |
          docker run --rm -v "$PWD/e2e:/app" openai-whisper \
            whisper test.wav --model tiny --language English --output_dir /app --output_format txt
          test -s e2e/test.txt && cat e2e/test.txt
          rm e2e/test.txt

      - name: End-to-end transcription test (CPU-only image, tiny model)
        run: |
          docker run --rm -v "$PWD/e2e:/app" openai-whisper:cpu \
            whisper test.wav --model tiny --language English --output_dir /app --output_format txt
          test -s e2e/test.txt && cat e2e/test.txt

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          DATE=$(date +%Y%m%d)
          docker tag openai-whisper "$IMAGE:latest"
          docker tag openai-whisper "$IMAGE:$DATE"
          docker tag openai-whisper:cpu "$IMAGE:cpu"
          docker tag openai-whisper:cpu "$IMAGE:cpu-$DATE"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$DATE"
          docker push "$IMAGE:cpu"
          docker push "$IMAGE:cpu-$DATE"

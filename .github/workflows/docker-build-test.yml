name: Docker Build & Run Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 1 * *'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t openai-whisper .

      - name: Verify whisper is installed
        run: docker run --rm openai-whisper whisper --help

      - name: Verify ffmpeg is installed
        run: docker run --rm openai-whisper ffmpeg -version

      - name: Verify Python is available
        run: docker run --rm openai-whisper python3 --version

      - name: Build with Docker Compose (CPU profile)
        run: docker compose --profile cpu build

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker tag openai-whisper "$IMAGE:latest"
          docker tag openai-whisper "$IMAGE:$(date +%Y%m%d)"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$(date +%Y%m%d)"
